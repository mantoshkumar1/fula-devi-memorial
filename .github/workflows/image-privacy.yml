name: Image privacy

# Verifies that no committed image carries EXIF, GPS, IPTC or XMP metadata.
# Runs on every push and pull request so images cannot bypass the local
# pre-commit hook. The checker has zero dependencies, so no install step is
# needed and the job stays fast.

on:
  push:
  pull_request:

jobs:
  check:
    name: Image metadata check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check images for private metadata
        run: node scripts/check-image-metadata.mjs
